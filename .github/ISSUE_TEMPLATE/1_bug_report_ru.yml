name: '🐛 Bug report (RU template translated to EN)'
title: '[Bug-report] '
description: Report a problem or unexpected behavior
labels: ['bug']

body:
  - type: checkboxes
    id: checklist
    attributes:
      label: '⚠️ Required checks'
      description: Before opening a new issue, confirm all items below
      options:
        - label: I read the [README](https://github.com/distillium/remnawave-backup-restore/blob/main/README.md)
        - label: I checked existing [Issues](https://github.com/distillium/remnawave-backup-restore/issues)
        - label: I updated to the [latest release](https://github.com/distillium/remnawave-backup-restore/releases)

  - type: input
    id: os
    attributes:
      label: '💿 Operating system'
      description: Specify OS name and version
      placeholder: 'For example: Ubuntu 24.04 / Debian 12'
    validations:
      required: true

  - type: dropdown
    id: installation_method
    attributes:
      label: '📦 Installation method'
      description: How did you install the script?
      options:
        - root user
        - other user
    validations:
      required: true

  - type: textarea
    id: problem_description
    attributes:
      label: '❔ Problem description'
      description: What happened and what did you expect?
      placeholder: Describe the issue in detail
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: '⚙️ Steps to reproduce'
      description: Provide exact reproduction steps
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs_screenshots
    attributes:
      label: '📎 Logs or screenshots'
      description: Paste logs and/or attach screenshots
      placeholder: Paste logs or screenshots here

  - type: textarea
    id: additional_info
    attributes:
      label: 'ℹ️ Additional context'
      description: Anything else we should know
      placeholder: Additional details helpful for debugging
