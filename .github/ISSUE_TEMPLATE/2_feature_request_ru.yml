name: '🌠 Feature request (RU template translated to EN)'
description: 'Suggest a new feature or improvement'
title: '[Request] '
labels: ['enhancement']

body:
  - type: textarea
    attributes:
      label: '🥰 Request summary'
      description: Provide a clear and concise description.
    validations:
      required: true

  - type: textarea
    attributes:
      label: '🧐 Proposed solution'
      description: Describe the expected behavior or implementation approach.
    validations:
      required: true

  - type: textarea
    attributes:
      label: 'ℹ️ Additional context'
      description: Add any extra context, examples, or references.
